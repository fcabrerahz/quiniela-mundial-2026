<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Bracket — Quiniela Mundial 2026 SRE</title>
  <style>
    :root {
      --green:#1a7a4a; --green-dark:#145e38; --green-light:#e8f5ee;
      --gold:#c9a84c; --gold-light:#fdf6e3;
      --ink:#1a1a1a; --ink-mid:#555; --ink-faint:#aaa;
      --line:#e0e0e0; --bg:#f4f4f2; --white:#fff;
      --r:6px;
      --col-w:148px; --match-h:68px; --gap:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

    header{background:var(--ink);color:#fff;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    header h1{font-size:1rem;font-weight:600;}
    header p{font-size:.72rem;opacity:.6;margin-top:2px;}
    .nav-links{display:flex;gap:14px;align-items:center;}
    .nav-link{font-size:.76rem;color:rgba(255,255,255,.7);text-decoration:none;}
    .nav-link:hover{color:#fff;}

    .toolbar{background:var(--white);border-bottom:1px solid var(--line);padding:.65rem 1rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .btn{font-size:.78rem;font-weight:600;padding:6px 14px;border:1.5px solid var(--ink);border-radius:var(--r);background:var(--white);color:var(--ink);cursor:pointer;transition:background .12s,color .12s;}
    .btn:hover{background:var(--ink);color:#fff;}
    .btn-green{background:var(--green);border-color:var(--green);color:#fff;}
    .btn-green:hover{background:var(--green-dark);border-color:var(--green-dark);}
    .toolbar-label{font-size:.75rem;color:var(--ink-mid);}

    /* Stage tabs */
    .stage-tabs{display:flex;gap:4px;overflow-x:auto;padding:.65rem 1rem;background:var(--white);border-bottom:1px solid var(--line);}
    .stage-tab{font-size:.73rem;font-weight:600;padding:5px 12px;border-radius:99px;border:1.5px solid var(--line);background:var(--white);color:var(--ink-mid);cursor:pointer;white-space:nowrap;transition:all .12s;}
    .stage-tab.active{background:var(--green);border-color:var(--green);color:#fff;}

    /* Scroll wrapper */
    .bracket-scroll{overflow-x:auto;padding:1.5rem 1rem 4rem;min-height:60vh;}

    /* Bracket grid */
    .bracket{display:flex;gap:32px;align-items:flex-start;}
    .bracket-col{display:flex;flex-direction:column;gap:var(--gap);min-width:var(--col-w);}
    .bracket-col-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);text-align:center;margin-bottom:4px;}
    .bracket-spacer{flex:1;}

    /* Match card */
    .match-card{
      width:var(--col-w);border:1px solid var(--line);border-radius:var(--r);
      background:var(--white);overflow:hidden;position:relative;
      transition:box-shadow .12s;
    }
    .match-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);}
    .match-card.tbd{opacity:.55;}

    .team-slot{
      display:flex;align-items:center;justify-content:space-between;
      padding:5px 8px;font-size:.75rem;min-height:28px;cursor:pointer;
      transition:background .1s;border-bottom:1px solid var(--line);
      gap:4px;
    }
    .team-slot:last-child{border-bottom:none;}
    .team-slot:hover{background:var(--green-light);}
    .team-slot.winner{background:var(--green-light);font-weight:700;}
    .team-slot.winner .team-score{color:var(--green-dark);}
    .team-slot.loser{opacity:.45;}

    .team-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .team-label{font-size:.58rem;color:var(--ink-faint);white-space:nowrap;}
    .team-score{
      font-size:.8rem;font-weight:700;min-width:18px;text-align:center;
      background:var(--bg);border-radius:3px;padding:1px 4px;
    }
    .match-info{
      font-size:.55rem;color:var(--ink-faint);text-align:center;
      padding:2px 4px;background:var(--bg);border-top:1px solid var(--line);
    }

    /* Score inputs in knockout */
    .score-row{display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 6px;background:var(--bg);border-top:1px solid var(--line);}
    .ks-input{width:30px;height:26px;text-align:center;font-size:.85rem;font-weight:700;border:1.5px solid var(--line);border-radius:4px;background:var(--white);outline:none;-moz-appearance:textfield;}
    .ks-input::-webkit-outer-spin-button,.ks-input::-webkit-inner-spin-button{-webkit-appearance:none;}
    .ks-input:focus{border-color:var(--green);}
    .ks-sep{font-size:.8rem;font-weight:700;color:var(--ink-faint);}

    /* Groups view */
    .groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;padding:1rem;}
    .group-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;}
    .group-title{background:var(--green);color:#fff;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:5px 10px;}
    .group-row{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--line);font-size:.78rem;}
    .group-row:last-child{border-bottom:none;}
    .group-pos{font-size:.65rem;font-weight:700;color:var(--ink-faint);width:14px;text-align:center;}
    .group-team{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .group-pts{font-size:.75rem;font-weight:700;min-width:22px;text-align:right;}
    .group-gd{font-size:.68rem;color:var(--ink-mid);min-width:22px;text-align:right;}
    .group-row.advances{background:var(--green-light);}
    .group-row.third{background:var(--gold-light);}
    .group-row.out{opacity:.45;}

    /* Legend */
    .legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding:.5rem 1rem;font-size:.68rem;color:var(--ink-mid);}
    .legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:3px;}

    /* Toast */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;font-size:.78rem;padding:7px 14px;border-radius:var(--r);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:300;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .info-banner{background:var(--gold-light);border:1px solid #e8d48a;border-radius:var(--r);padding:.65rem 1rem;font-size:.78rem;color:#5a3e00;margin:1rem 1rem 0;}
    .info-banner strong{font-weight:700;}
  </style>
</head>

function loadFromStorage() {
  try {
    const s = JSON.parse(localStorage.getItem('quiniela2026') || 'null');

    goalsAway = s.away || goalsHome;
    computeStandings();
    renderAll();
    showToast('✓ Quiniela cargada correctamente');
    document.getElementById('loadStatus').textContent =
      'Cargada desde: quiniela de grupos';
  } catch(e) {
    showToast('Error al cargar');
  }
}

  };

    TEAMS_IN_GROUP[g].forEach(t => { standings[g][t] = {team:t, pts:0, gd:0, gf:0, ga:0}; });
  });

  GROUP_MATCHES.forEach(m => {
    const h = goalsHome[m.idx], a = goalsAway[m.idx];
    if (h === null || a === null) return;
    const hs = standings[m.grp][m.home];
    const as = standings[m.grp][m.away];
    hs.gf += h; hs.ga += a; hs.gd += h-a;
    as.gf += a; as.ga += h; as.gd += a-h;
    if (h > a) { hs.pts += 3; }
    else if (h === a) { hs.pts += 1; as.pts += 1; }
    else { as.pts += 3; }
  });

  // Sort each group
  GROUPS.forEach(g => {
    standings[g] = Object.values(standings[g]).sort((a,b) =>
      b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team)
    );
  });

  // Compute 8 best third places
  thirdPlaces = GROUPS.map(g => ({...standings[g][2], group:g}))
    .sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf)
    .slice(0, 8);

  computeThirdAssignment();
}

  "DEFGHJKL":"EGJDHFLK",
  "DEFGIJKL":"EGIDJFLK",
  "DEFHIJKL":"EJIDHFLK",
  "DEGHIJKL":"EJIDHGLK",
  "DFGHIJKL":"HGIDJFLK",
  "EFGHIJKL":"EJIFHGLK"
};

// SLOT_COLS order used to decode the 8-char value string:
const FIFA_SLOT_ORDER = [6, 12, 8, 1, 9, 4, 14, 7];

let thirdAssignment = {}; // slot index -> team name

function computeThirdAssignment() {
  thirdAssignment = {};

  // Build the key: sorted groups that have a qualifying 3rd-place team
  const key = thirdPlaces.map(t => t.group).sort().join('');

  const row = FIFA_TABLE[key];
  if (!row) {
    // Fallback (shouldn't happen with real 495-row table)
    console.warn('FIFA table: no entry for key', key);
    return;
  }

  // Decode: each char is the GROUP whose 3rd-place team goes to that slot
  FIFA_SLOT_ORDER.forEach((slotIdx, i) => {
    const grpLetter = row[i];
    // Find which team finished 3rd in that group
    const thirdTeam = thirdPlaces.find(t => t.group === grpLetter);
    if (thirdTeam) thirdAssignment[slotIdx] = thirdTeam.team;
  });
}

// ─── TEAM RESOLUTION ────────────────────────────────────────────────────────
function resolveTeam(desc, slotIdx) {
  if (!desc) return null;
  if (desc.type === 'winner') return standings[desc.group]?.[0]?.team || null;
  if (desc.type === 'runner') return standings[desc.group]?.[1]?.team || null;
  if (desc.type === 'third3') {
    // Use pre-computed assignment to avoid duplicates
    return thirdAssignment[slotIdx] || null;
  }
  if (desc.type === 'ko') {
    const w = getKOWinner(desc.stage, desc.slot);
    return w;
  }
  return null;
}

function getKOWinner(stage, slot) {
  let picks, slots;
  if (stage === 'r32') { picks = koPicks.r32; slots = R32_SLOTS; }
  else if (stage === 'r16') { picks = koPicks.r16; slots = R16_SLOTS; }
  else if (stage === 'qf') { picks = koPicks.qf; slots = QF_SLOTS; }
  else if (stage === 'sf') { picks = koPicks.sf; slots = SF_SLOTS; }
  else return null;

  const p = Array.isArray(picks) ? picks[slot] : picks;
  if (!p || p.h === null) return null;

  const slotDef = Array.isArray(slots) ? slots[slot] : slots;
  const homeTeam = resolveTeam(slotDef.home, slot);
  const awayTeam = resolveTeam(slotDef.away, slot);

  if (p.h > p.a) return homeTeam;
  if (p.a > p.h) return awayTeam;
  return null;
}

// ─── RENDER ALL ─────────────────────────────────────────────────────────────
function renderAll() {
  renderGroups();
  renderR32();
  renderR16();
  renderQF();
  renderSF();
}

// ─── GROUPS VIEW ────────────────────────────────────────────────────────────
function renderGroups() {
  const hasData = goalsHome.some(v => v !== null);
  let html = '';
  if (!hasData) {
    html = `<div class="info-banner">⚠ <strong>No has cargado tu quiniela todavía.</strong> Haz clic en "Recargar desde quiniela" arriba, o llena primero la <a href="index.html">quiniela de grupos</a>.</div>`;
  }

  const tp8 = new Set(thirdPlaces.map(t=>t.team));
  html += `<div class="legend">
    <span><span class="legend-dot" style="background:var(--green-light);border:1px solid var(--green)"></span>Avanza (1ro/2do)</span>
    <span><span class="legend-dot" style="background:var(--gold-light);border:1px solid var(--gold)"></span>Mejor 3ro (clasificado)</span>
    <span><span class="legend-dot" style="background:#f5f5f5;border:1px solid var(--line)"></span>Eliminado</span>
  </div>`;

  html += '<div class="groups-grid">';
  GROUPS.forEach(g => {
    const rows = standings[g] || TEAMS_IN_GROUP[g].map(t=>({team:t,pts:0,gd:0,gf:0}));
    html += `<div class="group-card">
      <div class="group-title">Grupo ${g}</div>`;
    rows.forEach((r, i) => {
      const adv = i < 2;
      const third = i === 2 && tp8.has(r.team);
      const cls = adv ? 'advances' : third ? 'third' : 'out';
      const label = adv ? (i===0?'🥇':'🥈') : third ? '⭐3ro' : '';
      html += `<div class="group-row ${cls}">
        <span class="group-pos">${i+1}</span>
        <span class="group-team">${r.team}</span>
        <span class="group-gd" title="Diferencia de goles">${hasData ? (r.gd>=0?'+':'')+r.gd : '—'}</span>
        <span class="group-pts">${hasData ? r.pts+'pts' : '—'}</span>
        <span style="font-size:.65rem;color:var(--green-dark);margin-left:2px">${label}</span>
      </div>`;
    });
    html += '</div>';
  });
  html += '</div>';

  if (hasData) {
    html += `<div class="legend" style="padding:.5rem 1rem .25rem;font-size:.7rem;color:var(--ink-mid)">
      <strong>Mejores 3ros que clasifican (top 8):</strong>
      ${thirdPlaces.map(t=>`<span style="background:var(--gold-light);padding:2px 7px;border-radius:99px;border:1px solid var(--gold)">${t.team} (Grp ${t.group}, ${t.pts}pts, ${t.gd>=0?'+':''}${t.gd})</span>`).join(' ')}
    </div>`;
  }

  document.getElementById('stage-groups').innerHTML = html;
}

// ─── KO CARD BUILDER ────────────────────────────────────────────────────────
function koCard(stage, slotIdx, slotDef, picks) {
  const homeTeam = resolveTeam(slotDef.home, slotIdx) || '?';
  const awayTeam = resolveTeam(slotDef.away, slotIdx) || '?';
  const tbd = homeTeam === '?' || awayTeam === '?';
  const p = Array.isArray(picks) ? picks[slotIdx] : picks;
  const hScore = p?.h ?? '';
  const aScore = p?.a ?? '';

  // determine winner for styling
  let winnerTeam = null;
  if (p && p.h !== null && p.a !== null && p.h !== p.a) {
    winnerTeam = p.h > p.a ? homeTeam : awayTeam;
  }

  const mid = `${stage}-${slotIdx}`;
  return `<div class="match-card${tbd?' tbd':''}">
    <div class="team-slot${winnerTeam===homeTeam?' winner':winnerTeam&&winnerTeam!==homeTeam?' loser':''}" title="${homeTeam}">
      <span class="team-name">${homeTeam}</span>
      ${hScore!==''?`<span class="team-score">${hScore}</span>`:''}
    </div>
    <div class="team-slot${winnerTeam===awayTeam?' winner':winnerTeam&&winnerTeam!==awayTeam?' loser':''}" title="${awayTeam}">
      <span class="team-name">${awayTeam}</span>
      ${aScore!==''?`<span class="team-score">${aScore}</span>`:''}
    </div>
    <div class="score-row">
      <input class="ks-input" type="number" min="0" max="20" inputmode="numeric"
        id="ks-${mid}-h" value="${hScore}" placeholder="–"
        ${tbd?'disabled':''}
        oninput="onKO('${stage}',${slotIdx},'h',this.value)"/>
      <span class="ks-sep">:</span>
      <input class="ks-input" type="number" min="0" max="20" inputmode="numeric"
        id="ks-${mid}-a" value="${aScore}" placeholder="–"
        ${tbd?'disabled':''}
        oninput="onKO('${stage}',${slotIdx},'a',this.value)"/>
    </div>
  </div>`;
}

function onKO(stage, slotIdx, side, val) {
  const num = val === '' ? null : Math.max(0, Math.min(20, parseInt(val,10)));
  let p;
  if (stage==='final') { p = koPicks.final; }
  else { p = koPicks[stage][slotIdx]; }
  if (side==='h') p.h = isNaN(num)?null:num;
  else            p.a = isNaN(num)?null:num;
  saveKO();
  // Re-render all to propagate winners forward
  renderR32(); renderR16(); renderQF(); renderSF();
}

// ─── R32 ─────────────────────────────────────────────────────────────────
function renderR32() {
  const labels = ['M73','M74','M75','M76','M77','M78','M79','M80','M81','M82','M83','M84','M85','M86','M87','M88'];
  let html = `<div class="bracket-scroll"><div class="bracket">
    <div class="bracket-col">
      <div class="bracket-col-title">Ronda de 32 (28 Jun – 3 Jul)</div>`;
  R32_SLOTS.forEach((slot, i) => {
    html += `<div style="font-size:.6rem;color:var(--ink-faint);text-align:center;margin-bottom:2px">${labels[i]}</div>`;
    html += koCard('r32', i, slot, koPicks.r32);
    html += '<div style="height:4px"></div>';
  });
  html += '</div></div></div>';
  document.getElementById('stage-r32').innerHTML = html;
}

}

// ─── QF ──────────────────────────────────────────────────────────────────
function renderQF() {
  const labels = ['Cuarto 1','Cuarto 2','Cuarto 3','Cuarto 4'];
  let html = `<div class="bracket-scroll"><div class="bracket">
    <div class="bracket-col">

    html += `<div style="font-size:.6rem;color:var(--ink-faint);text-align:center;margin-bottom:2px">${labels[i]}</div>`;
    html += koCard('qf', i, slot, koPicks.qf);

  html += '</div></div></div>';

}

// ─── SF + FINAL ──────────────────────────────────────────────────────────
function renderSF() {
  const sfW1 = getKOWinner('sf', 0);
  const sfW2 = getKOWinner('sf', 1);
  const finH = koPicks.final.h;
  const finA = koPicks.final.a;
  const finTbd = !sfW1 || !sfW2;

  let winnerTeam = null;
  if (finH !== null && finA !== null && finH !== finA) {
    winnerTeam = finH > finA ? sfW1 : sfW2;
  }

  let html = `<div class="bracket-scroll"><div class="bracket">
    <div class="bracket-col">
      <div class="bracket-col-title">Semifinales (14–15 Jul)</div>`;
  SF_SLOTS.forEach((slot, i) => {
    html += `<div style="font-size:.6rem;color:var(--ink-faint);text-align:center;margin-bottom:2px">Semi ${i+1}</div>`;
    html += koCard('sf', i, slot, koPicks.sf);
    html += '<div style="height:4px"></div>';
  });
  html += '</div>';

  // Final column
  html += `<div class="bracket-col" style="justify-content:center;margin-top:60px">
    <div class="bracket-col-title">🏆 Final — 19 Jul · MetLife Stadium</div>
    <div class="match-card${finTbd?' tbd':''}">
      <div class="team-slot${winnerTeam===(sfW1||'?')?' winner':winnerTeam&&winnerTeam!==(sfW1||'?')?' loser':''}" title="${sfW1||'?'}">
        <span class="team-name">${sfW1||'?'}</span>
        ${finH!==null&&finH!==''?`<span class="team-score">${finH}</span>`:''}
      </div>
      <div class="team-slot${winnerTeam===(sfW2||'?')?' winner':winnerTeam&&winnerTeam!==(sfW2||'?')?' loser':''}" title="${sfW2||'?'}">
        <span class="team-name">${sfW2||'?'}</span>
        ${finA!==null&&finA!==''?`<span class="team-score">${finA}</span>`:''}
      </div>
      <div class="score-row">
        <input class="ks-input" type="number" min="0" max="20" inputmode="numeric"
          id="ks-final-0-h" value="${finH??''}" placeholder="–"
          ${finTbd?'disabled':''}
          oninput="onKOFinal('h',this.value)"/>
        <span class="ks-sep">:</span>
        <input class="ks-input" type="number" min="0" max="20" inputmode="numeric"
          id="ks-final-0-a" value="${finA??''}" placeholder="–"
          ${finTbd?'disabled':''}
          oninput="onKOFinal('a',this.value)"/>
      </div>
    </div>`;

  if (winnerTeam) {
    html += `<div style="text-align:center;margin-top:12px;font-size:1.1rem;font-weight:700;color:var(--gold)">🏆 ${winnerTeam}</div>
    <div style="text-align:center;font-size:.7rem;color:var(--ink-faint)">Tu campeón pronosticado</div>`;
  }

  html += '</div></div></div>';
  document.getElementById('stage-sf').innerHTML = html;
}

function onKOFinal(side, val) {
  const num = val === '' ? null : Math.max(0, Math.min(20, parseInt(val,10)));
  if (side==='h') koPicks.final.h = isNaN(num)?null:num;
  else            koPicks.final.a = isNaN(num)?null:num;
  saveKO();
  renderSF();
}

// ─── EXPORT FULL CSV (groups + knockout) ─────────────────────────────────
function exportFullCSV() {
  const name = document.getElementById('playerNameInput')?.value.trim() || (() => {
    try { const s = JSON.parse(localStorage.getItem('quiniela2026')||'{}'); return s.name||''; } catch(e){ return ''; }
  })();
  if (!name) { showToast('⚠ Escribe tu nombre en la quiniela de grupos primero'); return; }

  let csv = `NOMBRE,${name}\n`;
  csv += `seccion,id,local,visitante,goles_local,goles_visitante\n`;

  // Group stage picks
  GROUP_MATCHES.forEach(m => {
    const h = goalsHome[m.idx]; const a = goalsAway[m.idx];
    csv += `grupos,${m.idx},${m.home},${m.away},${h!==null?h:''},${a!==null?a:''}\n`;
  });

  // Knockout picks — r32
  koPicks.r32.forEach((p, i) => {
    const hTeam = resolveTeam(R32_SLOTS[i].home, i)||'?';
    const aTeam = resolveTeam(R32_SLOTS[i].away, i)||'?';
    csv += `r32,${i},${hTeam},${aTeam},${p.h!==null?p.h:''},${p.a!==null?p.a:''}\n`;
  });
  // r16
  koPicks.r16.forEach((p, i) => {
    const hTeam = resolveTeam(R16_SLOTS[i].home, i)||'?';
    const aTeam = resolveTeam(R16_SLOTS[i].away, i)||'?';
    csv += `r16,${i},${hTeam},${aTeam},${p.h!==null?p.h:''},${p.a!==null?p.a:''}\n`;
  });
  // qf
  koPicks.qf.forEach((p, i) => {
    const hTeam = resolveTeam(QF_SLOTS[i].home, i)||'?';
    const aTeam = resolveTeam(QF_SLOTS[i].away, i)||'?';
    csv += `qf,${i},${hTeam},${aTeam},${p.h!==null?p.h:''},${p.a!==null?p.a:''}\n`;
  });
  // sf
  koPicks.sf.forEach((p, i) => {
    const hTeam = resolveTeam(SF_SLOTS[i].home, i)||'?';
    const aTeam = resolveTeam(SF_SLOTS[i].away, i)||'?';
    csv += `sf,${i},${hTeam},${aTeam},${p.h!==null?p.h:''},${p.a!==null?p.a:''}\n`;
  });
  // final
  const fH = resolveTeam(FINAL_SLOT.home, 0)||'?';
  const fA = resolveTeam(FINAL_SLOT.away, 0)||'?';
  csv += `final,0,${fH},${fA},${koPicks.final.h!==null?koPicks.final.h:''},${koPicks.final.a!==null?koPicks.final.a:''}\n`;

  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `quiniela-completa-${name.replace(/\s+/g,'-').toLowerCase()}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast(`✓ Quiniela completa de ${name} exportada`);
}

// ─── TABS ────────────────────────────────────────────────────────────────
function showStage(id) {
  document.querySelectorAll('.stage-view').forEach(el => el.style.display='none');
  document.querySelectorAll('.stage-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('stage-'+id).style.display='block';
  document.getElementById('tab-'+id).classList.add('active');
}

// ─── TOAST ───────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

loadFromStorage(); // auto-load on open
