<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiniela Mundial 2026</title>
  <style>
    :root {
      --green:   #1a7a4a;
      --green-light: #e8f5ee;
      --gold:    #c9a84c;
      --gold-light: #fdf6e3;
      --red:     #c0392b;
      --ink:     #1a1a1a;
      --ink-mid: #555;
      --ink-faint:#999;
      --line:    #e0e0e0;
      --bg:      #f7f7f5;
      --white:   #ffffff;
      --radius:  8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--green);
      color: #fff;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 18px,
        rgba(255,255,255,0.03) 18px,
        rgba(255,255,255,0.03) 36px
      );
      pointer-events: none;
    }
    .header-ball {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 0.5rem;
    }
    header h1 {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: normal;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    header p {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.85rem;
      margin-top: 0.4rem;
      opacity: 0.8;
      letter-spacing: 0.06em;
    }

    /* ── MAIN LAYOUT ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
    }

    /* ── IDENTITY CARD ── */
    .identity-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 480px) { .identity-card { grid-template-columns: 1fr; } }

    .field label {
      display: block;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      border: none;
      border-bottom: 1.5px solid var(--line);
      padding: 4px 0;
      background: transparent;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-bottom-color: var(--green); }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      margin-bottom: 2rem;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.78rem;
      color: var(--ink-mid);
      margin-bottom: 6px;
    }
    .progress-meta strong { color: var(--green); }
    .progress-bar-bg {
      height: 5px;
      background: var(--line);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ── DATE SECTION ── */
    .date-group { margin-bottom: 1.75rem; }

    .date-header {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--green);
      font-weight: 700;
      padding: 0 0 6px;
      border-bottom: 2px solid var(--green);
      margin-bottom: 2px;
    }

    /* ── MATCH ROW ── */
    .match-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      background: var(--white);
      transition: background 0.1s;
    }
    .match-row:first-of-type { border-radius: var(--radius) var(--radius) 0 0; }
    .match-row:last-child { border-bottom: none; border-radius: 0 0 var(--radius) var(--radius); }
    .match-row.filled { background: var(--green-light); }

    .team-home {
      text-align: right;
      font-size: 0.92rem;
      font-weight: bold;
    }
    .team-away {
      text-align: left;
      font-size: 0.92rem;
    }

    /* ── SCORE INPUTS ── */
    .score-block {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .score-input {
      width: 38px;
      height: 38px;
      text-align: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -moz-appearance: textfield;
    }
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .score-input:focus { border-color: var(--green); }
    .score-input.has-value { border-color: var(--green); background: var(--white); }

    .score-sep {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink-faint);
      padding: 0 2px;
    }

    /* ── RESULT BADGE (auto-computed) ── */
    .result-badge {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 99px;
      display: none;
      margin-top: 2px;
    }
    .match-row.filled .result-badge { display: inline-block; }
    .badge-1  { background: #d4edda; color: #1a7a4a; }
    .badge-x  { background: #e8e8e8; color: #555; }
    .badge-2  { background: #d0e8fb; color: #1a5fa8; }

    /* ── STICKY FOOTER ── */
    .sticky-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1px solid var(--line);
      padding: 0.75rem 1rem;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 100;
    }

    .btn {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 10px 22px;
      border: 1.5px solid var(--ink);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--ink);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover { background: var(--ink); color: var(--white); }
    .btn-primary {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .btn-primary:hover { background: #145e38; border-color: #145e38; color: #fff; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius);
      max-width: 600px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 1.5rem;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.75rem;
    }
    .modal-header h2 {
      font-size: 1.15rem;
      font-weight: normal;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--ink-mid);
      line-height: 1;
    }
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.82rem;
    }
    .summary-table th {
      text-align: left;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      padding: 4px 8px;
      border-bottom: 1px solid var(--line);
    }
    .summary-table td {
      padding: 7px 8px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
    }
    .summary-table tr:last-child td { border-bottom: none; }
    .summary-table tr.pending td { color: var(--ink-faint); font-style: italic; }
    .warn-missing {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.82rem;
      color: var(--red);
      margin-top: 1rem;
      padding: 0.6rem 0.75rem;
      border: 1px solid #f5c6cb;
      background: #fff5f5;
      border-radius: var(--radius);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.82rem;
      padding: 9px 18px;
      border-radius: var(--radius);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .team-home, .team-away { font-size: 0.78rem; }
      .score-input { width: 32px; height: 32px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<header>
  <span class="header-ball">⚽</span>
  <h1>Quiniela Mundial 2026</h1>
  <p>Anota el marcador exacto de cada partido</p>
</header>

<main>
  <!-- Identity -->
  <div class="identity-card">
    <div class="field">
      <label>Tu nombre</label>
      <input type="text" id="playerName" placeholder="Escribe tu nombre..." autocomplete="off" />
    </div>
    <div class="field">
      <label>Fecha de entrega</label>
      <input type="date" id="dueDate" />
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Partidos completados</span>
      <span><strong id="countDone">0</strong> / <strong id="countTotal">72</strong></span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Match list rendered by JS -->
  <div id="matchList"></div>
</main>

<!-- Sticky footer -->
<div class="sticky-footer">
  <button class="btn" onclick="resetAll()">Limpiar todo</button>
  <button class="btn" onclick="exportCSV()">⬇ Exportar CSV</button>
  <button class="btn btn-primary" onclick="openSummary()">Ver resumen →</button>
</div>

<!-- Summary modal -->
<div class="modal-overlay" id="summaryModal" onclick="closeIfOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Resumen de quiniela</h2>
      <button class="modal-close" onclick="closeSummary()" aria-label="Cerrar">×</button>
    </div>
    <table class="summary-table">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Partido</th>
          <th style="text-align:center">Resultado</th>
          <th style="text-align:center">Ganador</th>
        </tr>
      </thead>
      <tbody id="summaryBody"></tbody>
    </table>
    <div id="missingWarn"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const MATCHES = [
  {date:"11 Jun", home:"México",          away:"Sudáfrica"},
  {date:"11 Jun", home:"Corea",           away:"Rep. Checa"},
  {date:"12 Jun", home:"Canadá",          away:"Bosnia Herz."},
  {date:"12 Jun", home:"EUA",             away:"Paraguay"},
  {date:"13 Jun", home:"Qatar",           away:"Suiza"},
  {date:"13 Jun", home:"Brasil",          away:"Marruecos"},
  {date:"13 Jun", home:"Australia",       away:"Turquía"},
  {date:"13 Jun", home:"Haití",           away:"Escocia"},
  {date:"14 Jun", home:"Alemania",        away:"Curasao"},
  {date:"14 Jun", home:"Países Bajos",    away:"Japón"},
  {date:"14 Jun", home:"Costa de Marfil", away:"Ecuador"},
  {date:"14 Jun", home:"Suecia",          away:"Túnez"},
  {date:"15 Jun", home:"Bélgica",         away:"Egipto"},
  {date:"15 Jun", home:"España",          away:"Cabo Verde"},
  {date:"15 Jun", home:"Irán",            away:"Nueva Zelandia"},
  {date:"15 Jun", home:"Arabia Saudita",  away:"Uruguay"},
  {date:"16 Jun", home:"Francia",         away:"Senegal"},
  {date:"16 Jun", home:"Irak",            away:"Noruega"},
  {date:"16 Jun", home:"Argentina",       away:"Argelia"},
  {date:"16 Jun", home:"Austria",         away:"Jordania"},
  {date:"17 Jun", home:"Portugal",        away:"Congo"},
  {date:"17 Jun", home:"Inglaterra",      away:"Croacia"},
  {date:"17 Jun", home:"Ghana",           away:"Panamá"},
  {date:"17 Jun", home:"Uzbekistán",      away:"Colombia"},
  {date:"18 Jun", home:"Suiza",           away:"Bosnia Herz."},
  {date:"18 Jun", home:"Rep. Checa",      away:"Sudáfrica"},
  {date:"18 Jun", home:"Canadá",          away:"Qatar"},
  {date:"18 Jun", home:"México",          away:"Corea"},
  {date:"19 Jun", home:"EUA",             away:"Australia"},
  {date:"19 Jun", home:"Escocia",         away:"Marruecos"},
  {date:"19 Jun", home:"Turquía",         away:"Paraguay"},
  {date:"19 Jun", home:"Brasil",          away:"Haití"},
  {date:"20 Jun", home:"Países Bajos",    away:"Suecia"},
  {date:"20 Jun", home:"Alemania",        away:"Costa de Marfil"},
  {date:"20 Jun", home:"Ecuador",         away:"Curasao"},
  {date:"20 Jun", home:"Túnez",           away:"Japón"},
  {date:"21 Jun", home:"Bélgica",         away:"Irán"},
  {date:"21 Jun", home:"España",          away:"Arabia Saudita"},
  {date:"21 Jun", home:"Uruguay",         away:"Cabo Verde"},
  {date:"21 Jun", home:"Nueva Zelandia",  away:"Egipto"},
  {date:"22 Jun", home:"Argentina",       away:"Austria"},
  {date:"22 Jun", home:"Francia",         away:"Irak"},
  {date:"22 Jun", home:"Jordania",        away:"Argelia"},
  {date:"22 Jun", home:"Noruega",         away:"Senegal"},
  {date:"23 Jun", home:"Portugal",        away:"Uzbekistán"},
  {date:"23 Jun", home:"Inglaterra",      away:"Ghana"},
  {date:"23 Jun", home:"Panamá",          away:"Croacia"},
  {date:"23 Jun", home:"Colombia",        away:"Congo"},
  {date:"24 Jun", home:"Suiza",           away:"Canadá"},
  {date:"24 Jun", home:"Bosnia Herz.",    away:"Qatar"},
  {date:"24 Jun", home:"Marruecos",       away:"Haití"},
  {date:"24 Jun", home:"Escocia",         away:"Brasil"},
  {date:"24 Jun", home:"Rep. Checa",      away:"México"},
  {date:"24 Jun", home:"Sudáfrica",       away:"Corea"},
  {date:"25 Jun", home:"Curasao",         away:"Costa de Marfil"},
  {date:"25 Jun", home:"Ecuador",         away:"Alemania"},
  {date:"25 Jun", home:"Japón",           away:"Suecia"},
  {date:"25 Jun", home:"Túnez",           away:"Países Bajos"},
  {date:"25 Jun", home:"Paraguay",        away:"Australia"},
  {date:"25 Jun", home:"Turquía",         away:"EUA"},
  {date:"26 Jun", home:"Senegal",         away:"Irak"},
  {date:"26 Jun", home:"Noruega",         away:"Francia"},
  {date:"26 Jun", home:"Cabo Verde",      away:"Arabia Saudita"},
  {date:"26 Jun", home:"Uruguay",         away:"España"},
  {date:"26 Jun", home:"Nueva Zelandia",  away:"Bélgica"},
  {date:"26 Jun", home:"Egipto",          away:"Irán"},
  {date:"27 Jun", home:"Croacia",         away:"Ghana"},
  {date:"27 Jun", home:"Panamá",          away:"Inglaterra"},
  {date:"27 Jun", home:"Congo",           away:"Uzbekistán"},
  {date:"27 Jun", home:"Colombia",        away:"Portugal"},
  {date:"27 Jun", home:"Jordania",        away:"Argentina"},
  {date:"27 Jun", home:"Argelia",         away:"Austria"},
];

// State: goalsHome[i] and goalsAway[i], or null if not entered
const goalsHome = new Array(MATCHES.length).fill(null);
const goalsAway = new Array(MATCHES.length).fill(null);

// ── LOAD from localStorage ──
function loadState() {
  try {
    const saved = localStorage.getItem('quiniela2026');
    if (!saved) return;
    const s = JSON.parse(saved);
    if (s.name) document.getElementById('playerName').value = s.name;
    if (s.due)  document.getElementById('dueDate').value = s.due;
    if (s.home) s.home.forEach((v, i) => { goalsHome[i] = v; });
    if (s.away) s.away.forEach((v, i) => { goalsAway[i] = v; });
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem('quiniela2026', JSON.stringify({
      name: document.getElementById('playerName').value,
      due:  document.getElementById('dueDate').value,
      home: goalsHome,
      away: goalsAway,
    }));
  } catch(e) {}
}

// ── RENDER ──
function groupByDate() {
  const g = {};
  MATCHES.forEach((m, i) => {
    if (!g[m.date]) g[m.date] = [];
    g[m.date].push({...m, idx: i});
  });
  return g;
}

function winner(h, a) {
  if (h === null || a === null) return null;
  if (h > a) return '1';
  if (h === a) return 'X';
  return '2';
}

function render() {
  const container = document.getElementById('matchList');
  const groups = groupByDate();
  let html = '';

  Object.entries(groups).forEach(([date, ms]) => {
    html += `<div class="date-group"><div class="date-header">${date}</div>`;
    ms.forEach(m => {
      const i = m.idx;
      const h = goalsHome[i];
      const a = goalsAway[i];
      const filled = h !== null && a !== null;
      const w = winner(h, a);
      const badgeCls = w === '1' ? 'badge-1' : w === 'X' ? 'badge-x' : 'badge-2';
      const badgeTxt = w === '1' ? m.home : w === 'X' ? 'Empate' : w === '2' ? m.away : '';

      html += `
        <div class="match-row${filled ? ' filled' : ''}" id="row-${i}">
          <div class="team-home">
            ${m.home}
            <br><span class="result-badge ${badgeCls}">${badgeTxt}</span>
          </div>
          <div class="score-block">
            <input class="score-input${h !== null ? ' has-value' : ''}"
              type="number" min="0" max="30" inputmode="numeric"
              id="h-${i}"
              value="${h !== null ? h : ''}"
              placeholder="–"
              oninput="onScore(${i},'h',this.value)"
              onkeydown="moveFocus(event,${i},'h')"
            />
            <span class="score-sep">:</span>
            <input class="score-input${a !== null ? ' has-value' : ''}"
              type="number" min="0" max="30" inputmode="numeric"
              id="a-${i}"
              value="${a !== null ? a : ''}"
              placeholder="–"
              oninput="onScore(${i},'a',this.value)"
              onkeydown="moveFocus(event,${i},'a')"
            />
          </div>
          <div class="team-away">${m.away}</div>
        </div>`;
    });
    html += '</div>';
  });

  container.innerHTML = html;
  updateProgress();

  // Re-attach identity listeners
  document.getElementById('playerName').addEventListener('input', saveState);
  document.getElementById('dueDate').addEventListener('input', saveState);
}

function onScore(idx, side, val) {
  const num = val === '' ? null : Math.max(0, Math.min(30, parseInt(val, 10)));
  if (side === 'h') goalsHome[idx] = isNaN(num) ? null : num;
  else              goalsAway[idx] = isNaN(num) ? null : num;

  const inp = document.getElementById(side === 'h' ? `h-${idx}` : `a-${idx}`);
  inp.classList.toggle('has-value', num !== null);

  // Update row filled state + badge without full re-render
  const row = document.getElementById(`row-${idx}`);
  const h = goalsHome[idx]; const a = goalsAway[idx];
  const filled = h !== null && a !== null;
  row.classList.toggle('filled', filled);

  const badge = row.querySelector('.result-badge');
  if (filled) {
    const w = winner(h, a);
    badge.className = 'result-badge ' + (w==='1'?'badge-1':w==='X'?'badge-x':'badge-2');
    badge.textContent = w==='1' ? MATCHES[idx].home : w==='X' ? 'Empate' : MATCHES[idx].away;
  } else {
    badge.textContent = '';
    badge.className = 'result-badge';
  }

  updateProgress();
  saveState();
}

function moveFocus(e, idx, side) {
  if (e.key === 'Tab' || e.key === 'Enter') {
    e.preventDefault();
    if (side === 'h') {
      document.getElementById(`a-${idx}`)?.focus();
    } else {
      // Next match home input
      document.getElementById(`h-${idx + 1}`)?.focus();
    }
  }
}

function updateProgress() {
  let done = 0;
  MATCHES.forEach((_, i) => {
    if (goalsHome[i] !== null && goalsAway[i] !== null) done++;
  });
  document.getElementById('countDone').textContent = done;
  document.getElementById('countTotal').textContent = MATCHES.length;
  document.getElementById('progressFill').style.width = Math.round(done / MATCHES.length * 100) + '%';
}

// ── SUMMARY MODAL ──
function openSummary() {
  const name = document.getElementById('playerName').value.trim() || 'Sin nombre';
  document.getElementById('modalTitle').textContent = `Quiniela de ${name}`;

  let missing = 0;
  let rows = '';
  MATCHES.forEach((m, i) => {
    const h = goalsHome[i]; const a = goalsAway[i];
    const filled = h !== null && a !== null;
    if (!filled) missing++;
    const scoreStr = filled ? `${h} – ${a}` : '—';
    const w = filled ? winner(h, a) : null;
    const wLabel = w === '1' ? m.home : w === 'X' ? 'Empate' : w === '2' ? m.away : '—';
    const badgeCls = w === '1' ? 'badge-1' : w === 'X' ? 'badge-x' : w === '2' ? 'badge-2' : '';
    rows += `<tr class="${filled ? '' : 'pending'}">
      <td>${m.date}</td>
      <td>${m.home} vs ${m.away}</td>
      <td style="text-align:center;font-weight:700">${scoreStr}</td>
      <td style="text-align:center"><span class="result-badge ${badgeCls}" style="display:${filled?'inline-block':'none'}">${wLabel}</span></td>
    </tr>`;
  });

  document.getElementById('summaryBody').innerHTML = rows;
  document.getElementById('missingWarn').innerHTML = missing > 0
    ? `<div class="warn-missing">⚠ Te faltan <strong>${missing}</strong> partido${missing===1?'':'s'} por completar.</div>`
    : '';

  document.getElementById('summaryModal').classList.add('open');
}
function closeSummary() {
  document.getElementById('summaryModal').classList.remove('open');
}
function closeIfOutside(e) {
  if (e.target === document.getElementById('summaryModal')) closeSummary();
}

// ── EXPORT CSV (formato simple para importar en admin) ──
function exportCSV() {
  const name = document.getElementById('playerName').value.trim();
  if (!name) { showToast('⚠ Escribe tu nombre antes de exportar'); return; }

  // Row 1: NOMBRE,Juan García
  // Row 2: header
  // Rows 3+: partido_id,goles_local,goles_visitante
  let csv = `NOMBRE,${name}\npartido,local,visitante\n`;
  MATCHES.forEach((m, i) => {
    const h = goalsHome[i]; const a = goalsAway[i];
    csv += `${i},${h !== null ? h : ''},${a !== null ? a : ''}\n`;
  });

  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `quiniela-${name.replace(/\s+/g,'-').toLowerCase()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV descargado ✓');
}

// ── RESET ──
function resetAll() {
  if (!confirm('¿Borrar todos los resultados? Esta acción no se puede deshacer.')) return;
  goalsHome.fill(null);
  goalsAway.fill(null);
  localStorage.removeItem('quiniela2026');
  render();
  showToast('Quiniela reiniciada');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
loadState();
render();
</script>
